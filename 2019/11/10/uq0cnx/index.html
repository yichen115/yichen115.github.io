<h1 id="misc"><a href="#misc" class="headerlink" title="misc"></a>misc</h1><h2 id="python-将字符串反转"><a href="#python-将字符串反转" class="headerlink" title="python 将字符串反转"></a>python 将字符串反转</h2><figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">a=<span class="string">"hello world!"</span></span><br><span class="line">print(a[::<span class="number">-1</span>])</span><br><span class="line"><span class="comment">#输出结果为：!dlrow olleh</span></span><br></pre></td></tr></table></figure>

<h2 id="爆破-hash"><a href="#爆破-hash" class="headerlink" title="爆破 hash"></a>爆破 hash</h2><figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> hashlib</span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">md5</span><span class="params">(s)</span>:</span></span><br><span class="line">    <span class="keyword">return</span> hashlib.md5(s).hexdigest()</span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(<span class="number">1</span>, <span class="number">9999999</span>):</span><br><span class="line">    <span class="keyword">if</span> md5(str(i)).startswith(<span class="string">'bf5ede'</span>):</span><br><span class="line">        <span class="keyword">print</span> i</span><br><span class="line"><span class="comment">#找到md5前6位是bf5ede的值</span></span><br></pre></td></tr></table></figure>

<h1 id="web"><a href="#web" class="headerlink" title="web"></a>web</h1><h1 id="re"><a href="#re" class="headerlink" title="re"></a>re</h1><h1 id="pwn"><a href="#pwn" class="headerlink" title="pwn"></a>pwn</h1><h1 id="crypto"><a href="#crypto" class="headerlink" title="crypto"></a>crypto</h1><h2 id="AES-求-d"><a href="#AES-求-d" class="headerlink" title="AES 求 d"></a>AES 求 d</h2><figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> gmpy2</span><br><span class="line">p =gmpy2.mpz(<span class="number">7</span>)</span><br><span class="line">q =gmpy2.mpz(<span class="number">17</span>)</span><br><span class="line">e =gmpy2.mpz(<span class="number">5</span>)</span><br><span class="line">phi_n= (p - <span class="number">1</span>) * (q - <span class="number">1</span>)</span><br><span class="line">d = gmpy2.invert(e, phi_n)</span><br><span class="line">print(<span class="string">"d is:"</span>)</span><br><span class="line"><span class="keyword">print</span> (d)</span><br></pre></td></tr></table></figure>
